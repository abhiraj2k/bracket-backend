spring:
  application:
    name: expense-tracker

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:expense_tracker}
    username: ${DB_USER:expense_user}
    password: ${DB_PASSWORD:expense_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000

  cache:
    type: redis

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:ZXhwZW5zZXRyYWNrZXItc2VjcmV0LWtleS0zMi1ieXRlcw==}
    expiry-seconds: 86400
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
