spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/expense_tracker
    username: ${DB_USER:expense_user}
    password: ${DB_PASSWORD:expense_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: scheduler_service
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    schemas: scheduler_service
    create-schemas: true
    default-schema: scheduler_service

shedlock:
  defaults:
    lock-at-most-for: PT10M
    lock-at-least-for: PT1M

resilience4j:
  circuitbreaker:
    instances:
      ledgerService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
